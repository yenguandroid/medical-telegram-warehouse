version: 2

sources:
  - name: raw
    description: "Raw data loaded from the JSON data lake and YOLO pipeline."
    schema: raw
    tables:
      - name: telegram_messages
        description: "All scraped Telegram messages across all channels."
        columns:
          - name: message_id
            description: "Unique message ID from Telegram API."
          - name: channel_name
            description: "Telegram channel username."
          - name: message_date
            description: "UTC timestamp of the original message."
          - name: message_text
            description: "Raw text content of the message."
          - name: views
            description: "Number of times the message was viewed."
          - name: forwards
            description: "Number of times the message was forwarded."
          - name: has_photo
            description: "True if the message contains a photo."
          - name: scraped_at
            description: "Timestamp when the message was scraped."
      - name: yolo_detections
        description: "YOLOv8 object detection results for all downloaded images."
        columns:
          - name: image_path
            description: "Relative path to the image file."
          - name: channel_name
            description: "Channel the image belongs to."
          - name: message_id
            description: "Telegram message ID the image came from."
          - name: detected_class
            description: "COCO class name detected by YOLO."
          - name: confidence
            description: "Detection confidence score (0.0 to 1.0)."
          - name: image_category
            description: "promotional / product_display / lifestyle / other."
          - name: model_name
            description: "YOLO model used (e.g. yolov8n.pt)."

models:
  - name: stg_telegram_messages
    description: >
      Cleaned and standardized Telegram messages.
    columns:
      - name: message_id
        description: "Telegram message ID."
        tests:
          - not_null
      - name: channel_name
        description: "Lowercased, trimmed channel username."
        tests:
          - not_null
      - name: message_date
        description: "UTC timestamp of the message."
        tests:
          - not_null
      - name: message_date_day
        description: "Date portion of message_date."
        tests:
          - not_null
      - name: message_length
        description: "Character count of message_text."
        tests:
          - not_null
      - name: view_count
        description: "Number of views, defaulted to 0 if null."
        tests:
          - not_null
      - name: forward_count
        description: "Number of forwards, defaulted to 0 if null."
        tests:
          - not_null
      - name: has_image
        description: "True if the message contains a photo."
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
      - name: channel_type
        description: "Pharmaceutical / Cosmetics / Medical."
        tests:
          - not_null
          - accepted_values:
              values: ['Pharmaceutical', 'Cosmetics', 'Medical']
      - name: has_text
        description: "True if message_text is non-empty."